<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Placed – FlashIt</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f4f6f8;
  font-family: 'Nunito', Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 48px 40px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 6px 24px rgba(0,0,0,0.1);
  max-width: 400px;
  width: 90%;
  animation: popIn 0.4s ease;
}

@keyframes popIn {
  from { transform: scale(0.85); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

.checkmark {
  font-size: 64px;
  margin-bottom: 16px;
  animation: bounce 0.6s 0.3s both;
}

@keyframes bounce {
  0%   { transform: scale(0); }
  60%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.card h1 {
  color: #28a745;
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 10px;
}

.card p {
  color: #555;
  font-size: 15px;
  margin-bottom: 8px;
  line-height: 1.5;
}

.timer {
  background: #f5ff3c;
  border-radius: 10px;
  padding: 12px 20px;
  margin: 20px 0;
  font-weight: 800;
  font-size: 22px;
  color: #111;
  letter-spacing: 1px;
}

.timer span { font-size: 13px; font-weight: 600; display: block; color: #555; margin-top: 2px; }

.back-btn {
  display: inline-block;
  text-decoration: none;
  background: #0a601e;
  color: white;
  padding: 11px 28px;
  border-radius: 9px;
  font-weight: 700;
  font-size: 15px;
  transition: background 0.2s;
  margin-top: 8px;
}
.back-btn:hover { background: #084d17; }
</style>
</head>
<body>

<div class="card">
  <div class="checkmark">✅</div>
  <h1>Order Placed!</h1>
  <p>Your items will be delivered in</p>

  <div class="timer">
    <span id="countdown">10:00</span>
    <span>minutes remaining</span>
  </div>

  <p style="color:#888; font-size:13px; margin-bottom:20px;">
    Flash<strong style="color:#0a601e">It</strong> ⚡ is on the way!
  </p>

  <a href="project.html" class="back-btn">← Back to Home</a>
</div>

<script>
let seconds = 600;
const el = document.getElementById("countdown");
const interval = setInterval(() => {
  seconds--;
  if (seconds <= 0) { clearInterval(interval); el.textContent = "Delivered! 🎉"; return; }
  const m = String(Math.floor(seconds / 60)).padStart(2, "0");
  const s = String(seconds % 60).padStart(2, "0");
  el.textContent = m + ":" + s;
}, 1000);
</script>

</body>
</html>
